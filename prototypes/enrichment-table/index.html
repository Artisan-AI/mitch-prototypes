<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enrichment Table Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Design System Tokens ─────────────────────────── */
:root {
  /* Purple (Brand) */
  --purple-10: #F3EFFB;
  --purple-15: #E9E1F8;
  --purple-20: #DFD2F4;
  --purple-25: #D5C4F1;
  --purple-30: #CAB5ED;
  --purple-40: #B598E6;
  --purple-50: #A17BDF;
  --purple-60: #682FC5;
  --purple-65: #5E2BB2;

  /* Tan */
  --tan-10: #FAF8F5;
  --tan-15: #F1EEE9;
  --tan-20: #E8E3DC;
  --tan-25: #DED8D1;
  --tan-30: #D3CCC5;
  --tan-40: #C0B4A7;
  --tan-50: #A89D90;
  --tan-60: #8E847A;
  --tan-65: #7F776E;
  --tan-70: #6A6358;
  --tan-80: #524E48;
  --tan-90: #373431;
  --tan-100: #201F1D;

  /* Green */
  --green-60: #43AD5B;
  --green-10: #F3FCF5;

  /* Red */
  --red-60: #D94638;
  --red-10: #FDF3F2;

  /* Orange */
  --orange-60: #E16931;

  /* Semantic tokens */
  --text-primary: var(--tan-100);
  --text-secondary: var(--tan-70);
  --text-helper: var(--tan-65);
  --text-placeholder: var(--tan-50);
  --text-interactive: var(--purple-60);
  --background-default: var(--tan-10);
  --background-hover: var(--tan-15);
  --layer-01: #FFFFFF;
  --layer-02: var(--tan-10);
  --border-subtle-01: var(--tan-20);
  --border-subtle-02: var(--tan-30);

  /* Motion */
  --duration-instant: 0ms;
  --duration-micro: 150ms;
  --duration-fast: 200ms;
  --duration-moderate: 300ms;
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in: cubic-bezier(0.55, 0, 1, 0.45);
  --ease-in-out: cubic-bezier(0.45, 0, 0.55, 1);
  --spring-snappy: cubic-bezier(0.16, 1, 0.3, 1);
}

/* ── Reset ────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--background-default);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 20px;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ───────────────────────────────────────── */
.app-shell {
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ──────────────────────────────────────── */
.sidebar {
  width: 52px;
  background: var(--purple-10);
  border-right: 1px solid var(--border-subtle-01);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
  gap: 8px;
  flex-shrink: 0;
}

.sidebar-logo {
  width: 28px;
  height: 28px;
  background: var(--purple-60);
  border-radius: 6px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.sidebar-logo svg { width: 16px; height: 16px; }

.sidebar-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--tan-60);
  cursor: pointer;
  transition: background var(--duration-micro) var(--ease-out);
}

.sidebar-icon:hover {
  background: var(--purple-15);
}

.sidebar-icon.active {
  background: var(--purple-20);
  color: var(--purple-60);
}

.sidebar-icon svg { width: 18px; height: 18px; }

/* ── Main content ─────────────────────────────────── */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

/* ── Header ───────────────────────────────────────── */
.page-header {
  padding: 16px 24px 0;
}

.breadcrumb {
  font-size: 13px;
  font-weight: 500;
  line-height: 20px;
  color: var(--purple-60);
  margin-bottom: 12px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.breadcrumb:hover { text-decoration: underline; }

.page-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.page-title {
  font-size: 20px;
  font-weight: 600;
  line-height: 28px;
  letter-spacing: -0.015em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.badge-static {
  font-size: 11px;
  font-weight: 500;
  line-height: 16px;
  background: var(--tan-20);
  color: var(--text-secondary);
  padding: 2px 8px;
  border-radius: 4px;
}

.page-meta {
  font-size: 12px;
  color: var(--text-helper);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn {
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  line-height: 20px;
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background var(--duration-micro) var(--ease-out), transform var(--duration-micro) var(--ease-out);
}

.btn:active { transform: scale(0.97); }

.btn-secondary {
  background: var(--tan-80);
  color: white;
}
.btn-secondary:hover { background: var(--tan-70); }

.btn-brand {
  background: var(--purple-60);
  color: white;
}
.btn-brand:hover { background: var(--purple-65); }

.btn-outline {
  background: transparent;
  border: 1px solid var(--border-subtle-02);
  color: var(--text-primary);
}
.btn-outline:hover { background: var(--background-hover); }

.btn-icon {
  padding: 8px;
}

.campaigns-badge {
  font-size: 11px;
  font-weight: 500;
  background: var(--purple-10);
  color: var(--purple-60);
  padding: 1px 6px;
  border-radius: 10px;
  margin-left: 2px;
}

/* ── Table container ──────────────────────────────── */
.table-container {
  flex: 1;
  padding: 0 24px 24px;
  overflow: auto;
}

.table-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
}

.search-input {
  font-family: inherit;
  font-size: 14px;
  color: var(--text-primary);
  background: var(--layer-01);
  border: 1px solid var(--border-subtle-01);
  border-radius: 8px;
  padding: 8px 12px 8px 36px;
  width: 560px;
  outline: none;
  transition: border-color var(--duration-fast) var(--ease-out);
}

.search-input:focus { border-color: var(--purple-60); }

.search-wrapper {
  position: relative;
}

.search-wrapper svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-placeholder);
  width: 16px;
  height: 16px;
}

.table-count {
  font-size: 12px;
  color: var(--text-helper);
  padding: 4px 0;
}

/* ── Data table ───────────────────────────────────── */
.data-table {
  width: 100%;
  table-layout: fixed;
  border-collapse: collapse;
  background: var(--layer-01);
  border: 1px solid var(--border-subtle-01);
  border-radius: 12px;
  overflow: hidden;
}

.data-table thead th {
  font-size: 13px;
  font-weight: 500;
  line-height: 20px;
  color: var(--text-secondary);
  text-align: left;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border-subtle-01);
  background: var(--layer-01);
  white-space: nowrap;
  user-select: none;
}

.data-table thead th .sort-icon {
  display: inline-flex;
  margin-left: 4px;
  opacity: 0.4;
  vertical-align: middle;
}

.data-table tbody tr {
  border-bottom: 1px solid var(--border-subtle-01);
  transition: background var(--duration-micro) var(--ease-out);
}

.data-table tbody tr:last-child { border-bottom: none; }

.data-table tbody tr:hover { background: var(--background-hover); }

.data-table tbody td {
  padding: 10px 16px;
  font-size: 14px;
  line-height: 20px;
  vertical-align: middle;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Prospect cell ────────────────────────────────── */
.prospect-cell {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: white;
}

.prospect-info { display: flex; flex-direction: column; }
.prospect-name { font-weight: 500; font-size: 14px; }
.prospect-title { font-size: 12px; color: var(--text-secondary); }

/* ── Status badges ────────────────────────────────── */
.status-positive { color: var(--green-60); font-weight: 500; font-size: 13px; }
.status-negative { color: var(--red-60); font-weight: 500; font-size: 13px; }
.status-not-found { color: var(--text-helper); font-size: 13px; }
.status-no-response { color: var(--text-helper); font-size: 13px; }

.icp-score {
  font-weight: 600;
  font-size: 14px;
  font-variant-numeric: tabular-nums;
}

.icp-high { color: var(--purple-60); }
.icp-medium { color: var(--orange-60); }
.icp-low { color: var(--red-60); }

/* ── Checkbox ─────────────────────────────────────── */
.checkbox {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border-subtle-02);
  border-radius: 4px;
  cursor: pointer;
  flex-shrink: 0;
}

/* ── Three dot menu ───────────────────────────────── */
.row-menu {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  cursor: pointer;
  color: var(--text-placeholder);
  opacity: 0;
  transition: opacity var(--duration-micro) var(--ease-out);
}

tr:hover .row-menu { opacity: 1; }
.row-menu:hover { background: var(--tan-20); color: var(--text-secondary); }

/* ═══════════════════════════════════════════════════
   ENRICHMENT BUTTON — the star of the show
   ═══════════════════════════════════════════════════ */
.enrich-cell {
  position: relative;
  min-width: 100px;
  height: 100%;
  display: flex;
  align-items: center;
}

.enrich-btn {
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 0 6px;
  height: 24px;
  border-radius: 6px;
  border: 1px solid var(--border-subtle-02);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  line-height: 16px;
  white-space: nowrap;
  background: white;
  color: var(--text-primary);
  transition: background var(--duration-micro) var(--ease-out),
              border-color var(--duration-micro) var(--ease-out),
              width 320ms var(--ease-out),
              border-radius 320ms var(--ease-out),
              transform var(--duration-micro) var(--ease-out);
  position: relative;
  overflow: hidden;
}

.enrich-btn:hover {
  background: var(--tan-20);
  border-color: var(--tan-40);
}

.enrich-btn:active {
  transform: scale(0.97);
}

.enrich-btn .star-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  color: var(--tan-90);
}

.enrich-btn .btn-label {
  padding: 0 4px;
}

/* ── Loading state ────────────────────────────────── */
.enrich-loading {
  display: none;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  overflow: hidden;
  border: 1px solid var(--border-subtle-02);
  border-radius: 6px;
  padding: 4px 10px;
  width: 100%;
  height: 26px;
  opacity: 0;
  /* morph + fade transition */
  transition: border-radius 280ms var(--ease-out), opacity 180ms var(--ease-out);
}

.enrich-loading.active {
  display: flex;
}

.enrich-loading.morphed {
  opacity: 1;
  width: 100%;
  border-radius: 999px;
}

.loading-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--tan-30);
  border-top-color: var(--tan-60);
  border-radius: 50%;
  animation: spin 600ms linear infinite;
  flex-shrink: 0;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 12px;
  font-weight: 400;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
  flex: 1;
  /* Fade wrapper — handles the in/out transition per message swap */
  animation: textFade 3s var(--ease-in-out) infinite;
}

.loading-text-inner {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  /* AI shimmer — tan-only color ripple sweeps across text */
  background: linear-gradient(
    90deg,
    var(--tan-60) 0%,
    var(--tan-60) 35%,
    var(--tan-30) 50%,
    var(--tan-60) 65%,
    var(--tan-60) 100%
  );
  background-size: 250% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: aiShimmer 3s linear infinite;
}

@keyframes textFade {
  0%   { opacity: 0; transform: translateY(4px); }
  10%  { opacity: 1; transform: translateY(0); }
  82%  { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-4px); }
}

@keyframes aiShimmer {
  0%   { background-position: 250% 0; }
  100% { background-position: -250% 0; }
}

/* ── Filled result ────────────────────────────────── */
.enrich-result {
  display: none;
  font-size: 14px;
  line-height: 20px;
  white-space: nowrap;
  align-items: center;
  gap: 4px;
  overflow: visible;
}

.enrich-result .result-star {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  color: var(--tan-65);
}

.enrich-result.visible {
  display: flex;
}

/* ── Completion: character stagger reveal ──────────── */
.enrich-result .char {
  display: inline;
  opacity: 0;
  color: #F8A36F;
}

.enrich-result.animate .char {
  animation: charReveal 1.2s var(--ease-out) forwards;
}

.enrich-result .char.space {
  width: 0.25em;
}

@keyframes charReveal {
  0%   { opacity: 0; color: #F8A36F; }
  15%  { opacity: 1; color: #F8A36F; }
  30%  { color: #B74EF9; }
  45%  { color: #5488F8; }
  55%  { color: var(--text-primary); }
  100% { opacity: 1; color: var(--text-primary); }
}

/* ── Pagination ───────────────────────────────────── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
}

.pagination-left {
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.pagination-pages {
  display: flex;
  align-items: center;
  gap: 4px;
}

.page-num {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-secondary);
  transition: background var(--duration-micro) var(--ease-out);
}

.page-num:hover { background: var(--tan-20); }
.page-num.active { background: var(--purple-60); color: white; }
.page-dots { font-size: 13px; color: var(--text-placeholder); padding: 0 2px; }

.page-arrow {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-secondary);
}
.page-arrow:hover { background: var(--tan-20); }

/* ── Enrichment Tooltip ───────────────────────────── */
/* Tooltip — fixed positioning to escape table overflow */
.enrich-tooltip {
  position: fixed;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;

  background: white;
  border: 1px solid var(--border-subtle-01);
  border-radius: 8px;
  padding: 8px 10px;
  box-shadow: 0 4px 12px rgba(32, 31, 29, 0.10), 0 1px 3px rgba(32, 31, 29, 0.06);

  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;

  /* entrance: 200ms ease-out per tooltip spec */
  transition: opacity var(--duration-fast) var(--ease-out),
              transform var(--duration-fast) var(--ease-out);
  transform: translateY(4px);
}

.enrich-tooltip.show {
  opacity: 1;
  transform: translateY(0);
}

/* Arrow */
.enrich-tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: white;
  filter: drop-shadow(0 1px 0 var(--border-subtle-01));
}

.enrich-tooltip .coin-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.enrich-tooltip .tooltip-cost {
  font-size: 12px;
  font-weight: 500;
  line-height: 16px;
  color: var(--text-primary);
}

.enrich-tooltip .tooltip-cost-value {
  color: var(--purple-60);
  font-weight: 600;
}

/* ── Loading progress tooltip ─────────────────────── */
.progress-tooltip {
  position: fixed;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;

  background: white;
  border: 1px solid var(--border-subtle-01);
  border-radius: 10px;
  padding: 10px 14px;
  box-shadow: 0 4px 16px rgba(32, 31, 29, 0.12), 0 1px 3px rgba(32, 31, 29, 0.06);

  display: flex;
  flex-direction: column;
  gap: 6px;
  white-space: nowrap;

  /* Entrance: 200ms ease-out with opacity + translateY (tooltip spec)
     Exit: 150ms ease-in (exits faster than entrances) */
  transition: opacity var(--duration-fast) var(--ease-out),
              transform var(--duration-fast) var(--ease-out);
  transform: translateY(4px);
}

.progress-tooltip.hiding {
  transition: opacity var(--duration-micro) var(--ease-in),
              transform var(--duration-micro) var(--ease-in);
}

.progress-tooltip.show {
  opacity: 1;
  transform: translateY(0);
}

/* Arrow */
.progress-tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: white;
  filter: drop-shadow(0 1px 0 var(--border-subtle-01));
}

/* Step rows — stagger entrance via opacity + translateY */
.progress-tooltip .step-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  line-height: 16px;
  font-weight: 400;
  color: var(--text-placeholder);
  /* Smooth transitions for state changes (pending→active→done) */
  transition: color var(--duration-fast) var(--ease-out),
              opacity var(--duration-fast) var(--ease-out),
              transform var(--duration-fast) var(--ease-out);
  opacity: 0;
  transform: translateY(4px);
}

/* Stagger rows in when tooltip shows — each row gets --i inline */
.progress-tooltip.show .step-row {
  opacity: 1;
  transform: translateY(0);
  /* 40ms stagger between items, capped at 7 per motion spec */
  transition-delay: calc(var(--i, 0) * 40ms);
}

.progress-tooltip .step-row.done {
  color: var(--text-secondary);
}

.progress-tooltip .step-row.active {
  color: var(--text-primary);
  font-weight: 500;
}

/* Pending rows are dimmer */
.progress-tooltip .step-row:not(.done):not(.active) {
  color: var(--text-placeholder);
}

/* Check icon container */
.step-check {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Empty circle for pending steps */
.step-check .check-empty {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 1.5px solid var(--tan-30);
  transition: border-color var(--duration-fast) var(--ease-out),
              background var(--duration-fast) var(--ease-out);
}

/* Active step — purple ring */
.step-row.active .check-empty {
  border-color: var(--purple-40);
  background: var(--purple-10);
}

/* Green checkmark — pops in with spring-snappy scale */
.step-check .check-done {
  width: 14px;
  height: 14px;
  color: var(--green-60);
  animation: checkPop var(--duration-fast) var(--spring-snappy);
}

@keyframes checkPop {
  0%   { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* ── Result tooltip (all steps done) ─────────────── */
.result-tooltip {
  position: fixed;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  background: white;
  border: 1px solid var(--border-subtle-01);
  border-radius: 10px;
  padding: 10px 14px;
  box-shadow: 0 4px 16px rgba(32, 31, 29, 0.12), 0 1px 3px rgba(32, 31, 29, 0.06);
  display: flex;
  flex-direction: column;
  gap: 6px;
  white-space: nowrap;
  transition: opacity var(--duration-fast) var(--ease-out),
              transform var(--duration-fast) var(--ease-out);
  transform: translateY(4px);
}

.result-tooltip.hiding {
  transition: opacity var(--duration-micro) var(--ease-in),
              transform var(--duration-micro) var(--ease-in);
}

.result-tooltip.show {
  opacity: 1;
  transform: translateY(0);
}

  if (!tooltip) return;

  btn.addEventListener('mouseenter', () => {
    const rect = btn.getBoundingClientRect();
    // Position off-screen to measure width
    tooltip.style.left = '-9999px';
    tooltip.style.top = '-9999px';
    tooltip.classList.add('show');
    // Wait a frame so tooltip has layout
    requestAnimationFrame(() => {
      const tw = tooltip.offsetWidth;
      const th = tooltip.offsetHeight;
      tooltip.style.left = Math.round(rect.left + rect.width / 2 - tw / 2) + 'px';
      tooltip.style.top = Math.round(rect.top - th - 8) + 'px';
    });
  });

  btn.addEventListener('mouseleave', () => {

});

function updateProgressStep(tooltipEl, newActiveIndex) {
  const rows = tooltipEl.querySelectorAll('.step-row');
  rows.forEach((row, i) => {
    const checkEl = row.querySelector('.step-check');
    if (i < newActiveIndex) {
      // Just completed — only swap icon if not already done
      if (!row.classList.contains('done')) {
        row.classList.remove('active');
        row.classList.add('done');
        checkEl.innerHTML = checkDoneSVG;

    } else if (i === newActiveIndex) {
      row.classList.remove('done');
      row.classList.add('active');

function startEnrich(btn) {
  const cell = btn.closest('.enrich-cell');
  const type = btn.dataset.type;
  const loadingEl = cell.querySelector('.enrich-loading');
  const textInner = cell.querySelector('.loading-text-inner');
  const resultEl = cell.querySelector('.enrich-result');
  const progressTooltip = cell.querySelector('.progress-tooltip');
  const messages = ENRICHMENT_MESSAGES[type];

  // 1. Morph button → loading pill
  const tooltip = cell.querySelector('.enrich-tooltip');
  if (tooltip) tooltip.style.display = 'none';
  btn.style.pointerEvents = 'none';
  btn.style.cursor = 'default';

  // Snapshot button width, set explicitly so we can animate from it
  const btnWidth = btn.getBoundingClientRect().width;
  btn.style.width = btnWidth + 'px';

  // Fade out the button label content
  const btnLabel = btn.querySelector('.btn-label');
  const btnIcon = btn.querySelector('.star-icon');
  if (btnLabel) { btnLabel.style.transition = 'opacity 180ms var(--ease-in)'; btnLabel.style.opacity = '0'; }
  if (btnIcon) { btnIcon.style.transition = 'opacity 180ms var(--ease-in)'; btnIcon.style.opacity = '0'; }

  // Next frame: grow button to full width + pill radius
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      btn.style.width = '100%';
      btn.style.borderRadius = '999px';
    });
  });

  // After the grow transition, swap to loading element
  setTimeout(() => {
    btn.style.display = 'none';
    loadingEl.style.transition = 'none';
    loadingEl.style.opacity = '1';
    loadingEl.classList.add('active');
    loadingEl.classList.add('morphed');
    textInner.textContent = messages[0];
  }, 340);

  // Build tooltip once, then patch individual rows
  let isLoading = true;
  initProgressTooltip(progressTooltip, messages);
  updateProgressStep(progressTooltip, 0);

  // Hover logic for loading area → show progress tooltip
  function showProgressTip() {
    if (!isLoading) return;
    const rect = loadingEl.getBoundingClientRect();
    progressTooltip.style.left = '-9999px';
    progressTooltip.style.top = '-9999px';
    progressTooltip.classList.add('show');
    requestAnimationFrame(() => {
      const tw = progressTooltip.offsetWidth;
      const th = progressTooltip.offsetHeight;
      progressTooltip.style.left = Math.round(rect.left + rect.width / 2 - tw / 2) + 'px';
      progressTooltip.style.top = Math.round(rect.top - th - 8) + 'px';
    });
  }
  function hideProgressTip() {
    progressTooltip.classList.add('hiding');
    progressTooltip.classList.remove('show');
    setTimeout(() => progressTooltip.classList.remove('hiding'), 150);
  }
  loadingEl.addEventListener('mouseenter', showProgressTip);
  loadingEl.addEventListener('mouseleave', hideProgressTip);

  // 2. Message rotation
  let msgIndex = 0;
  const loadingTextEl = cell.querySelector('.loading-text');
  const interval = setInterval(() => {
    msgIndex = (msgIndex + 1) % messages.length;
    updateProgressStep(progressTooltip, msgIndex);
    loadingTextEl.style.animation = 'none';
    loadingTextEl.offsetHeight; // reflow
    textInner.textContent = messages[msgIndex];
    loadingTextEl.style.animation = 'textFade 3s var(--ease-in-out) infinite';
  }, 3000);

  // 3. After ~12-15 seconds, show result
  const totalTime = 10000 + Math.random() * 5000;
  setTimeout(() => {
    clearInterval(interval);
    isLoading = false;
    hideProgressTip();
    loadingEl.removeEventListener('mouseenter', showProgressTip);
    loadingEl.removeEventListener('mouseleave', hideProgressTip);

    // Morph loading pill back to button size, then reveal result
    loadingEl.classList.remove('morphed');
    setTimeout(() => {
      loadingEl.classList.remove('active');
      loadingEl.style.width = '';

      // Show result with staggered character reveal
      const result = getResult(type);
      const staggerDelay = 25;
      const resultStarSVG = starSVG.replace('class="star-icon"', 'class="result-star"');
      const charsHTML = result.split('').map((ch, i) => {
        if (ch === ' ') return `<span class="char space" style="animation-delay:${i * staggerDelay}ms"></span>`;
        return `<span class="char" style="animation-delay:${i * staggerDelay}ms">${ch}</span>`;
      }).join('');
      resultEl.innerHTML = resultStarSVG + `<span class="result-text">${charsHTML}</span>`;
      resultEl.classList.add('visible');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          resultEl.classList.add('animate');
        });
      });

      // Build result tooltip — all steps completed
      const resultTooltip = cell.querySelector('.result-tooltip');
      resultTooltip.innerHTML = messages.map((msg, i) =>
        `<div class="step-row" style="--i:${i}">
          <span class="step-check">${checkDoneSVG}</span>
          <span>${msg}</span>
        </div>`
      ).join('');

      resultEl.addEventListener('mouseenter', () => {
        const rect = resultEl.getBoundingClientRect();
        resultTooltip.style.left = '-9999px';
        resultTooltip.style.top = '-9999px';
        resultTooltip.classList.add('show');
        requestAnimationFrame(() => {
          const tw = resultTooltip.offsetWidth;
          const th = resultTooltip.offsetHeight;
          resultTooltip.style.left = Math.round(rect.left + rect.width / 2 - tw / 2) + 'px';
          resultTooltip.style.top = Math.round(rect.top - th - 8) + 'px';
        });
      });
      resultEl.addEventListener('mouseleave', () => {
        resultTooltip.classList.add('hiding');
        resultTooltip.classList.remove('show');
        setTimeout(() => resultTooltip.classList.remove('hiding'), 150);
      });
    }, 300);
  }, totalTime);
}
</script>
</body>
</html>
